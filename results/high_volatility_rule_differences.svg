  <rect x="95" y="115" width="210" height="120" fill="#fee2e2" stroke="#ffffff"/>
  <rect x="345" y="115" width="210" height="120" fill="#dbeafe" stroke="#ffffff"/>
  <rect x="595" y="115" width="210" height="120" fill="#dbeafe" stroke="#ffffff"/>
  <text x="200" y="150" text-anchor="middle" font-family="Arial" font-size="18" fill="#991b1b">爆仓概率差</text>
